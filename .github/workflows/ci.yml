# --------------------------------------------------------------------------
# Autonomy Engine — CI Pipeline
#
# Runs on every push and pull request against main.
#
# Jobs:
#   lint         — ruff check + ruff format (fast, catches style issues early)
#   test         — full pytest suite on Python 3.10, 3.11, 3.12
#   import-check — verify all core modules import cleanly
#   security     — bandit SAST scan + pip-audit dependency check
#
# Why separate jobs instead of one big step?
#   - Lint is fast and fails first, giving quick feedback.
#   - Security scans don't need multiple Python versions.
#   - Test matrix covers compatibility; the others are version-independent.
#   - Import check catches missing deps that unit tests might not exercise.
#
# Note: Prefect orchestration was retired on 2026-04-25 (ahead of the
# 2026-05-21 sunset target) as part of the deps CVE cleanup. The
# tests/test_production_readiness.py module that exercised the Prefect
# flow has been removed; this comment is a tombstone for git archaeology.
# --------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (saves Actions minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Ruff lint check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # run all versions even if one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev,dashboard]"

      - name: Run tests
        run: python -m pytest --tb=short -q

  # ── Import Check ──────────────────────────────────────────────────────────
  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev,dashboard]"

      - name: Verify core imports
        run: |
          python -c "
          import engine.context
          import engine.decision_gates
          import engine.evidence
          import engine.llm_provider
          import engine.model_registry
          import engine.extraction
          import engine.log_config
          import engine.notifier
          import engine.sandbox
          import engine.state_loader
          import engine.tracer
          import engine.design_contract
          import engine.contract_checker
          import engine.spec_normalizer
          import engine.tier_context
          import engine.cost_estimator
          import engine.cache
          import intake.schema
          import intake.renderer
          import tasks.bootstrap
          import tasks.design
          import tasks.extract
          import tasks.implement
          import tasks.manifest_schema
          import tasks.test
          import tasks.verify
          import engine.report
          import dashboard.app
          print('All imports OK')
          "

  # ── Security ──────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"
          pip install bandit pip-audit

      - name: Bandit SAST scan
        # -ll = only report MEDIUM and above; --severity-level high = fail on HIGH
        run: python -m bandit -r engine/ tasks/ intake/ graph/ -ll

      - name: pip-audit dependency check
        # Ignored CVEs (each is a build/install tool, not a runtime dep we
        # ship — both have host-side fix paths users can apply directly):
        #   CVE-2026-3219  — pip itself; no upstream fix yet (pip 26.0.1).
        #   CVE-2026-24049 — wheel 0.45.1; fix is 0.46.2. The runner's
        #                    pre-installed wheel ages independently of our
        #                    lockfile and isn't in the runtime tree.
        run: python -m pip_audit --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-24049

  # ── Audit trail integrity ─────────────────────────────────────────────────
  # Maps to: OWASP ASVS V7.1 (Log Tamper Protection), NIST AI RMF MEASURE 2.7.
  # Turns the "tamper-evident" claim from a design assertion into a property
  # CI can enforce: (1) synthetic tamper tests demonstrate detection works,
  # (2) any real state/runs/ in the checkout is verified end-to-end.
  trace-integrity:
    name: Audit trail integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tamper-detection integration tests
        run: pytest tests/test_trace_tampering_integration.py -v

      - name: Verify recorded run traces (if any in checkout)
        run: |
          # Use `find` instead of `state/runs/*/` glob — the glob stays
          # literal when no subdir matches, and the `state/runs/` directory
          # itself is kept in-tree via .gitkeep sentinels.
          found_runs=$(find state/runs -mindepth 1 -maxdepth 1 -type d 2>/dev/null || true)
          if [ -z "$found_runs" ]; then
            echo "No recorded runs in this checkout — skipping."
          else
            echo "$found_runs" | while IFS= read -r d; do
              run_id=$(basename "$d")
              echo "Verifying run: $run_id"
              python -m engine.verify_trace --run-id "$run_id" --json
            done
          fi

      - name: Archive trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-trace
          path: state/runs/**/trace.jsonl

  # ── Docker sandbox backend ────────────────────────────────────────────────
  # Maps to: MITRE ATLAS T1609, NIST AI RMF GOVERN 1.4, OWASP LLM02.
  # The Docker sandbox is the primary isolation story for untrusted AI-generated
  # code.  Locally these tests skip when Docker isn't running; CI must verify
  # Docker is available and fail if not, so a silent skip never hides a broken
  # backend.  ``AE_REQUIRE_DOCKER=1`` turns the pytest-level skip into a
  # pytest.fail().  ``docker version`` in the first step is the belt to that
  # suspenders — failing before pytest even starts if the runner lacks Docker.
  docker-sandbox-tests:
    name: Docker sandbox backend
    runs-on: ubuntu-latest
    env:
      AE_REQUIRE_DOCKER: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Docker is available (hard fail if missing)
        run: |
          docker version
          docker info --format '{{.ServerVersion}}'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run Docker sandbox tests (strict — no silent skips)
        # --strict-markers rejects unknown markers; combined with AE_REQUIRE_DOCKER
        # above, any skipped docker-gated test becomes a fail.
        run: python -m pytest tests/test_docker_sandbox.py -v --strict-markers

      - name: Prune sandbox images (cleanup)
        if: always()
        run: make sandbox-gc || true
