llm:
  provider: "claude"  # "claude" or "openai"

  # Budget cap — the *most* output tokens any single LLM call may request.
  # The engine will automatically clamp this to the model's hard limit if
  # you set it higher, so you'll never get a 400 error.  Set it *lower*
  # than the model max to control cost (e.g. 8192 for cheap iteration).
  max_tokens: 16384

  claude:
    model: "claude-sonnet-4-20250514"
  openai:
    model: "gpt-4o"
  # Per-stage model overrides (optional).
  # If a stage key is missing, falls back to llm.<provider>.model above.
  # LLM responses are cached deterministically under state/cache/llm/ —
  # identical inputs produce a cache hit, skipping the API call entirely.
  models:
    design: "claude-sonnet-4-20250514"
    implement: "claude-sonnet-4-20250514"
    verify: "claude-sonnet-4-20250514"

# Notifications log to the Python logger.  To receive real alerts,
# replace engine/notifier.py with a Slack/email implementation.
notifications:
  enabled: false

# Sandbox settings for the test stage.
# When enabled, checks run in an isolated temp workspace with its own virtualenv.
#
# Backend:
#   local  (default) — copy project to a host tempdir + venv. Filesystem
#                      isolation only. Fast. Suitable for trusted specs.
#   docker           — run each check inside an ephemeral container with
#                      network dropped, read-only root, non-root uid,
#                      tmpfs /tmp, and CPU + memory caps. Slower (~2-3s
#                      startup per check), image cached by deps hash.
#                      Requires a running Docker daemon.
#                      Maps to: MITRE ATLAS T1609, NIST AI RMF GOVERN 1.4.
#
# Docker sub-options (ignored when backend=local):
#   docker.python_version: "3.11"   # base image tag suffix
#   docker.cpus: "2.0"              # --cpus flag
#   docker.memory: "2g"             # --memory / --memory-swap flags
sandbox:
  enabled: true        # run checks in an isolated copy (default: true)
  install_deps: true   # install requirements.txt / pyproject.toml in the sandbox
  backend: local       # "local" | "docker"
  # docker:
  #   python_version: "3.11"
  #   cpus: "2.0"
  #   memory: "2g"

# Verify stage mode:
#   always_llm  — always call the LLM for verification (original v1.x behavior)
#   auto        — skip LLM when evidence makes outcome obvious (default)
#   never_llm   — always write deterministic VERIFICATION.md, never call LLM
# llm_on_fail_summary / llm_on_pass_summary only apply in auto mode.
verify:
  mode: auto
  llm_on_fail_summary: true
  llm_on_pass_summary: true

# Cache eviction — stale entries are cleaned at the start of each run.
# LLM response cache: entries older than llm_ttl_days are deleted.
# Venv cache: cached virtualenvs older than venv_ttl_days are deleted.
# Set to 0 to disable eviction for that cache type.
cache:
  llm_ttl_days: 30
  venv_ttl_days: 7

# Approved commands for the test stage.
# Only commands listed here will be executed — the LLM cannot invent its own.
# Each entry needs: name (identifier) and command (shell command).
# checks:
#   - name: "tests"
#     command: "python -m pytest"
#   - name: "lint"
#     command: "python -m ruff check ."
#   - name: "typecheck"
#     command: "python -m mypy ."
checks: []
