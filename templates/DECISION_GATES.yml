gates:
  design:
    policy: "pause"
    default_option: null
    description: "Architecture choice when multiple viable approaches identified"
  implement:
    policy: "pause"
    default_option: "use_last_writer_wins"
    description: "Human arbitration when chunks produce conflicting file paths (manifest_conflict)"
  test:
    policy: "skip"
    default_option: "continue"
    description: "Triage when test failures detected"
  verify:
    policy: "pause"
    default_option: null
    description: "Review when verification outputs REJECTED — blocks pipeline for human decision"
